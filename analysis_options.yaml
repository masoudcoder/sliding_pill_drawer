# Analyzer configuration for the sliding_pill_drawer package.
#
# Tightens the default flutter_lints baseline with rules expected of a
# pub.dev-published package: documented public API, consistent quoting,
# strict type inference, and stable formatting choices.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_required_param: error
    missing_return: error
  exclude:
    - example/build/**
    - build/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Documentation
    public_member_api_docs: true
    package_api_docs: true

    # Style
    prefer_single_quotes: true
    require_trailing_commas: true
    sort_pub_dependencies: true
    sort_constructors_first: true
    use_super_parameters: true
    always_declare_return_types: true

    # Safety
    avoid_print: true
    cancel_subscriptions: true
    close_sinks: true
    throw_in_finally: true
    unawaited_futures: true
