version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Major bumps almost always need a manual review.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
